<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript 계산기</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="calculator">
      <h1>사칙연산 계산기</h1>

      <label for="first-number">첫 번째 숫자</label>
      <input id="first-number" type="number" />

      <label for="second-number">두 번째 숫자</label>
      <input id="second-number" type="number" />

      <div class="button-row">
        <button id="add-button">더하기</button>
        <button id="subtract-button">빼기</button>
        <button id="multiply-button">곱하기</button>
        <button id="divide-button">나누기</button>
        <!-- c 버튼 새로 만들었습니다. 초기화버튼 -->
        <button id="clear-button">초기화 (C)</button>
      </div>

      <p class="result-label">계산 결과</p>
      <p id="result">0</p>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
