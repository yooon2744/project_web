<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>계산기 디자인</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="display">
        <p class="expression">180 x 2</p>
        <p class="result">360</p>
      </div>

      <div class="buttons">
        <button class="action">C</button>
        <button class="operator">÷</button>
        <button class="operator">×</button>
        <button class="operator">-</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="equal">=</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        
        <!-- 아래 1줄을 추가해서 자연스럽게 만들어봤습니다. -->
        <button>0</button>
        <button>00</button>
        <button>000</button>
        <button>.</button>
      </div>
    </div>
  </body>
</html>
