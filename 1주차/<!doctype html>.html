<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1주차 - 개발환경 세팅</title>
  </head>
  <body>
    <!-- h1은 가장 큰 제목입니다. 페이지의 주제를 보여줄 때 자주 사용합니다. -->
    <h1>웹 프로그래밍 실습 1주차</h1>

    <!-- p는 문단입니다. 설명 문장을 적을 때 사용합니다. -->
    <p>Live Server로 실행해서 화면이 잘 보이는지 확인해 보세요.</p>

    <!-- strong은 중요한 글자를 강조할 때 사용합니다. -->
    <p><strong>학번:</strong> 20260001</p>
    <p><strong>이름:</strong> 하종승</p>

    <!-- 아래 문장은 학생이 자유롭게 바꿔 보도록 만든 예시입니다. -->
    <p>안녕하세요. 저는 웹 프로그래밍에 관심이 많은 학생입니다.</p>
  </body>
</html>
